openapi: "3.1.0"
info:
  title: AstroSage Verification Service
  version: "1.0.0"
  description: Answer and citation verification API
paths:
  /verify/answer:
    post:
      summary: Verify an answer against sources
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                answer: { type: string }
                source_ids: { type: array, items: { type: string } }
      responses:
        "200":
          description: Verification result
  /verify/citation:
    post:
      summary: Verify a citation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                citation: { type: string }
                source: { type: string }
      responses:
        "200":
          description: Verification result
