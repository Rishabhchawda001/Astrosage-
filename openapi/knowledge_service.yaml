openapi: "3.1.0"
info:
  title: AstroSage Knowledge Service
  version: "1.0.0"
  description: Knowledge Lake query and management API
paths:
  /search:
    post:
      summary: Search across knowledge base
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query: { type: string }
                top_k: { type: integer, default: 10 }
                filters: { type: object }
      responses:
        "200":
          description: Search results
  /documents:
    get:
      summary: List indexed documents
      responses:
        "200":
          description: Document list
  /documents/{doc_id}:
    get:
      summary: Get document by ID
      parameters:
        - name: doc_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Document details
