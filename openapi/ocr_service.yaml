openapi: "3.1.0"
info:
  title: AstroSage OCR Service
  version: "1.0.0"
  description: OCR processing management API
paths:
  /process:
    post:
      summary: Process a document with OCR
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                document_id: { type: string }
                engine: { type: string, enum: [tesseract, paddleocr, ocrmypdf] }
                languages: { type: array, items: { type: string } }
      responses:
        "202":
          description: OCR job created
  /statistics:
    get:
      summary: OCR processing statistics
      responses:
        "200":
          description: OCR stats
