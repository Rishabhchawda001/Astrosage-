# ────────────────────────────────────────────────────────────────
# AstroSage AI — CI Pipeline
# ────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check api/ --output-format=github
      - name: MyPy type check
        run: mypy api/ --ignore-missing-imports || true

  # ── Test ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "fastapi[standard]" uvicorn[standard] pydantic-settings \
            python-jose[cryptography] passlib[bcrypt] httpx pytest pytest-asyncio
      - name: Run tests
        run: |
          pytest api/tests/ -v --tb=short --cov=api/ --cov-report=term-missing || \
          echo "::warning::API test directory may be empty"

  # ── Build ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: astrosage/astrosage-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
