# ────────────────────────────────────────────────────────────────
# AstroSage AI — Nginx Server Configuration
# ────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name astrosage.ai www.astrosage.ai;

    # Security
    server_tokens off;

    # API endpoints → backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # API docs
    location /docs {
        proxy_pass http://api_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://api_backend/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://api_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # MCP SSE endpoint
    location /mcp {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # Chat completions (SSE streaming)
    location /api/v1/chat/completions {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE support
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 120s;
    }

    # Prometheus metrics (internal only)
    location /api/v1/metrics {
        # Uncomment for internal access only:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Readiness probes (no rate limiting, no logging)
    location = /readyz {
        access_log off;
        proxy_pass http://api_backend/readyz;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location = /livez {
        access_log off;
        proxy_pass http://api_backend/livez;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Frontend static assets with immutable cache
    location /_next/static/ {
        proxy_pass http://frontend_backend;
        proxy_cache astrosage_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Favicon with long cache
    location = /favicon.ico {
        proxy_pass http://frontend_backend;
        proxy_cache astrosage_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Other static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?|eot|ttf|otf|css|js)$ {
        proxy_pass http://frontend_backend;
        proxy_cache astrosage_cache;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }
}
