# ────────────────────────────────────────────────────────────────
# AstroSage AI — Docker Compose
# ────────────────────────────────────────────────────────────────
#
# Development:  docker compose up --build
# Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ── API Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrosage-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - KNOWLEDGE_BASE_PATH=/app/knowledge/releases/v1.0.0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://frontend:3000
      - LOG_LEVEL=DEBUG
    volumes:
      - ./knowledge/releases/v1.0.0:/app/knowledge/releases/v1.0.0:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 15s
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astrosage-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ── Redis (caching, rate limiting, sessions) ────────────────
  redis:
    image: redis:7-alpine
    container_name: astrosage-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (user data, conversations) ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: astrosage-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: astrosage
      POSTGRES_PASSWORD: astrosage-dev
      POSTGRES_DB: astrosage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrosage"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
