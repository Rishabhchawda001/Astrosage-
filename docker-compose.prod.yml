# ────────────────────────────────────────────────────────────────
# AstroSage AI — Production Docker Compose Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: astrosage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── API Server (Production) ────────────────────────────────
  api:
    environment:
      - APP_ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=https://astrosage.ai,https://www.astrosage.ai
      - LOG_LEVEL=WARNING
      - DATABASE_URL=postgresql+asyncpg://astrosage:${POSTGRES_PASSWORD}@postgres:5432/astrosage
      - REDIS_URL=redis://redis:6379/0
    volumes: []  # Remove dev volume mounts in production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

  # ── Frontend (Production) ──────────────────────────────────
  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=https://astrosage.ai
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ── Redis (Production) ─────────────────────────────────────
  redis:
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── PostgreSQL (Production) ────────────────────────────────
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
