<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroSage AI</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a2e; --surface2: #16213e;
    --primary: #e94560; --accent: #0f3460; --text: #eaeaea;
    --text2: #a0a0b0; --border: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; }
  .app { display: flex; height: 100vh; }
  .sidebar { width: 320px; background: var(--surface); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 18px; color: var(--primary); }
  .sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .conv-list { flex: 1; overflow-y: auto; padding: 10px; }
  .conv-item { padding: 12px; margin-bottom: 6px; border-radius: 8px;
               cursor: pointer; transition: background .15s; font-size: 14px; }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--accent); }
  .conv-item .preview { color: var(--text2); font-size: 12px; margin-top: 4px;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; gap: 12px; }
  .chat-header .model { font-size: 13px; color: var(--text2); }
  .new-chat-btn { background: var(--primary); color: white; border: none;
                  padding: 6px 16px; border-radius: 6px; cursor: pointer;
                  font-size: 13px; font-weight: 600; }
  .new-chat-btn:hover { opacity: .85; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; }
  .message { margin-bottom: 20px; max-width: 800px; }
  .message .role { font-size: 12px; color: var(--text2); margin-bottom: 4px;
                   text-transform: uppercase; letter-spacing: .5px; }
  .message .content { line-height: 1.6; font-size: 15px; white-space: pre-wrap; }
  .message.user { margin-left: auto; text-align: right; }
  .message.user .content { background: var(--accent); padding: 12px 16px;
                           border-radius: 12px 4px 12px 12px; display: inline-block; }
  .message.assistant .content { padding: 4px 0; }
  .message .sources { margin-top: 8px; font-size: 13px; color: var(--text2); }
  .message .sources summary { cursor: pointer; }
  .input-area { border-top: 1px solid var(--border); padding: 16px 24px; }
  .input-row { display: flex; gap: 12px; max-width: 800px; }
  .input-row textarea { flex: 1; background: var(--surface); border: 1px solid var(--border);
                        border-radius: 8px; padding: 12px; color: var(--text);
                        font-size: 14px; resize: none; min-height: 48px;
                        font-family: inherit; outline: none; }
  .input-row textarea:focus { border-color: var(--primary); }
  .input-row button { background: var(--primary); color: white; border: none;
                      border-radius: 8px; padding: 0 20px; cursor: pointer;
                      font-weight: 600; font-size: 14px; min-width: 80px; }
  .input-row button:disabled { opacity: .5; cursor: not-allowed; }
  .input-row button:hover:not(:disabled) { opacity: .85; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .thinking .dot { width: 8px; height: 8px; background: var(--text2);
                   border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  .thinking .dot:nth-child(2) { animation-delay: .16s; }
  .thinking .dot:nth-child(3) { animation-delay: .32s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center;
                 justify-content: center; color: var(--text2); gap: 12px; }
  .empty-state h2 { font-size: 24px; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 400px; text-align: center; }
  .empty-state .examples { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
                           margin-top: 16px; }
  .empty-state .examples button { background: var(--surface); border: 1px solid var(--border);
                                  padding: 12px 16px; border-radius: 8px; color: var(--text);
                                  cursor: pointer; font-size: 13px; text-align: left; }
  .empty-state .examples button:hover { border-color: var(--primary); }
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 24px; cursor: pointer; font-size: 14px; color: var(--text2);
         border-bottom: 2px solid transparent; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .search-view { display: none; flex-direction: column; flex: 1; }
  .search-view.active { display: flex; }
  .search-results { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .search-result { background: var(--surface); border-radius: 8px; padding: 16px;
                   margin-bottom: 8px; }
  .search-result .title { font-weight: 600; margin-bottom: 4px; }
  .search-result .meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .search-result .text { font-size: 14px; line-height: 1.5; }
  .search-result .score { font-size: 11px; color: var(--primary); margin-top: 4px; }
  .search-box { display: flex; gap: 8px; padding: 12px 24px; }
  .search-box input { flex: 1; background: var(--surface); border: 1px solid var(--border);
                      border-radius: 8px; padding: 12px; color: var(--text);
                      font-size: 14px; outline: none; }
  .search-box input:focus { border-color: var(--primary); }
  .search-box button { background: var(--accent); color: white; border: none;
                       border-radius: 8px; padding: 0 20px; cursor: pointer; }
  .login-view { display: flex; align-items: center; justify-content: center;
                height: 100vh; flex-direction: column; gap: 16px; }
  .login-view .card { background: var(--surface); padding: 40px; border-radius: 16px;
                      display: flex; flex-direction: column; gap: 12px; width: 360px; }
  .login-view input { background: var(--bg); border: 1px solid var(--border);
                      padding: 12px; border-radius: 8px; color: var(--text);
                      font-size: 14px; outline: none; }
  .login-view input:focus { border-color: var(--primary); }
  .login-view button { background: var(--primary); color: white; border: none;
                       padding: 12px; border-radius: 8px; cursor: pointer;
                       font-weight: 600; font-size: 14px; }
  .login-view button:hover { opacity: .85; }
  .login-view .error { color: var(--primary); font-size: 13px; }
  .login-view h2 { text-align: center; color: var(--primary); }
  .login-view .subtitle { text-align: center; color: var(--text2); font-size: 13px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── State ─────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('token') || null,
  user: null,
  conversations: [],
  activeConvId: null,
  messages: [],
  streaming: false,
  view: 'chat', // 'chat' | 'search'
};

// ── API Client ────────────────────────────────────────────────
const API = {
  async request(method, path, body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : null });
    if (res.status === 401) { state.token = null; localStorage.removeItem('token'); render(); }
    if (path.includes('/chat/completions') && body?.stream) return res;
    return res.json();
  },
  register: (u, p) => API.request('POST', '/api/v1/auth/register', { username: u, password: p }),
  login: (u, p) => API.request('POST', '/api/v1/auth/token', { username: u, password: p }),
  getMe: () => API.request('GET', '/api/v1/auth/me'),
  listConversations: () => API.request('GET', '/api/v1/conversations'),
  getConversation: (id) => API.request('GET', `/api/v1/conversations/${id}`),
  createConversation: (title) => API.request('POST', '/api/v1/conversations', { title }),
  deleteConversation: (id) => API.request('DELETE', `/api/v1/conversations/${id}`),
  addMessage: (cid, role, content) =>
    API.request('POST', `/api/v1/conversations/${cid}/messages`, { role, content }),
  getMessages: (cid) => API.request('GET', `/api/v1/conversations/${cid}/messages`),
  search: (q, k = 10) => API.request('POST', '/api/v1/search', { query: q, top_k: k }),
};

// ── Chat Logic ────────────────────────────────────────────────
async function sendMessage(convId, text) {
  if (state.streaming) return;
  state.streaming = true; render();

  let cid = convId;
  if (!cid) {
    const conv = await API.createConversation(text.slice(0, 60));
    cid = conv.id;
    state.activeConvId = cid;
    await loadConversations();
  }

  // Add user message to local state
  state.messages.push({ role: 'user', content: text });
  state.messages.push({ role: 'assistant', content: '', streaming: true });
  render();
  scrollToBottom();

  // Get existing messages for context
  let contextMessages = [];
  try {
    const msgs = await API.getMessages(cid);
    contextMessages = msgs.map(m => ({ role: m.role, content: m.content }));
  } catch(e) {}

  contextMessages.push({ role: 'user', content: text });

  try {
    const response = await fetch('/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',
                 ...(state.token ? { 'Authorization': `Bearer ${state.token}` } : {}) },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: contextMessages,
        conversation_id: cid,
        stream: true,
      }),
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          const lastMsg = state.messages[state.messages.length - 1];
          if (lastMsg && lastMsg.streaming) {
            lastMsg.content += delta;
          }
          render();
          scrollToBottom();
        } catch(e) {}
      }
    }
  } catch(e) {
    const lastMsg = state.messages[state.messages.length - 1];
    if (lastMsg && lastMsg.streaming) {
      lastMsg.content = 'Error: Could not reach the AI service. Falling back to knowledge base...\n\n' +
        'The knowledge base search and graph endpoints remain available.';
    }
  }

  // Finalize
  const lastMsg = state.messages[state.messages.length - 1];
  if (lastMsg) lastMsg.streaming = false;
  state.streaming = false;
  await loadConversations();
  render();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

async function loadConversations() {
  if (!state.token) return;
  try {
    state.conversations = await API.listConversations();
    render();
  } catch(e) {}
}

async function selectConversation(id) {
  state.activeConvId = id;
  try {
    const conv = await API.getConversation(id);
    state.messages = conv.messages.map(m => ({ role: m.role, content: m.content }));
  } catch(e) {
    state.messages = [];
  }
  state.view = 'chat';
  render();
  scrollToBottom();
}

function newChat() {
  state.activeConvId = null;
  state.messages = [];
  render();
}

// ── Search Logic ──────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input')?.value;
  if (!q) return;
  const results = await API.search(q);
  const container = document.getElementById('search-results');
  if (!container) return;
  container.innerHTML = results.results.map(r => `
    <div class="search-result">
      <div class="title">${r.level}${r.scripture_id ? ` — ${r.scripture_id}` : ''}</div>
      <div class="meta">ID: ${r.chunk_id} | Score: ${r.score}</div>
      <div class="text">${escapeHtml(r.text).slice(0, 300)}...</div>
      <div class="score">Relevance: ${(r.score * 100).toFixed(0)}%</div>
    </div>
  `).join('');
  if (results.results.length === 0) {
    container.innerHTML = '<div style="padding:24px;color:var(--text2)">No results found.</div>';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Auth ──────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  try {
    const res = await API.login(u, p);
    if (res.access_token) {
      state.token = res.access_token;
      localStorage.setItem('token', res.access_token);
      await initApp();
    } else {
      errEl.textContent = 'Login failed. Try registering first.';
    }
  } catch(e) {
    errEl.textContent = 'Login failed: ' + e.message;
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  try {
    await API.register(u, p);
    await handleLogin(e);
  } catch(e) {
    errEl.textContent = 'Registration failed: ' + (e.message || 'unknown error');
  }
}

async function handleLogout() {
  state.token = null;
  localStorage.removeItem('token');
  state.conversations = [];
  state.messages = [];
  state.activeConvId = null;
  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.token) {
    app.innerHTML = `
      <div class="login-view">
        <div class="card">
          <h2>AstroSage AI</h2>
          <p class="subtitle">Knowledge Operating System</p>
          <input id="login-user" type="text" placeholder="Username" value="demo">
          <input id="login-pass" type="password" placeholder="Password" value="demo12345678">
          <button onclick="handleRegister(event)">Register & Login</button>
          <button onclick="handleLogin(event)" style="background:var(--accent)">Login</button>
          <div id="login-error" class="error"></div>
        </div>
      </div>`;
    return;
  }

  app.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <h1>AstroSage AI</h1>
          <p>${state.user || 'user'}</p>
        </div>
        <div style="padding:10px">
          <button class="new-chat-btn" onclick="newChat()" style="width:100%">+ New Chat</button>
        </div>
        <div class="conv-list" id="conv-list">
          ${state.conversations.map(c => `
            <div class="conv-item ${c.id === state.activeConvId ? 'active' : ''}"
                 onclick="selectConversation('${c.id}')">
              ${c.title || 'Untitled'}
              <div class="preview">${c.updated_at?.slice(0,10) || ''}</div>
            </div>
          `).join('')}
        </div>
        <div style="padding:10px;border-top:1px solid var(--border)">
          <button onclick="handleLogout()" style="background:none;border:1px solid var(--border);
            color:var(--text2);padding:8px;border-radius:6px;cursor:pointer;width:100%;font-size:13px">
            Logout
          </button>
        </div>
      </div>
      <div class="main">
        <div class="tab-bar">
          <div class="tab ${state.view === 'chat' ? 'active' : ''}" onclick="state.view='chat';render();scrollToBottom()">Chat</div>
          <div class="tab ${state.view === 'search' ? 'active' : ''}" onclick="state.view='search';render()">Search</div>
        </div>
        <div class="chat-view" style="display:flex;flex-direction:column;flex:1;${state.view === 'chat' ? '' : 'display:none'}">
          ${state.messages.length === 0 ? `
            <div class="empty-state">
              <h2>Ask AstroSage AI</h2>
              <p>Explore Hindu scriptures, philosophy, and knowledge with evidence-backed answers.</p>
              <div class="examples">
                <button onclick="sendMessage(null, 'Who is Krishna and what is his role?')">Who is Krishna?</button>
                <button onclick="sendMessage(null, 'Explain the concept of karma')">Explain karma</button>
                <button onclick="sendMessage(null, 'List all Pandavas and their relationships')">List the Pandavas</button>
                <button onclick="sendMessage(null, 'Compare Advaita and Dvaita philosophy')">Advaita vs Dvaita</button>
              </div>
            </div>` : `
            <div class="messages" id="messages">
              ${state.messages.map(m => `
                <div class="message ${m.role}">
                  <div class="role">${m.role}</div>
                  <div class="content">${m.streaming && !m.content ? '<div class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>'
                    : m.content ? escapeHtml(m.content).replace(/\\n/g, '<br>')
                    : ''}</div>
                </div>
              `).join('')}
            </div>
          `}
          <div class="input-area">
            <div class="input-row">
              <textarea id="chat-input" placeholder="Ask about Hindu scriptures..." rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();
                  const t=this.value;if(t){this.value='';sendMessage(state.activeConvId,t)}}"
                ${state.streaming ? 'disabled' : ''}></textarea>
              <button onclick="const t=document.getElementById('chat-input');if(t.value){const v=t.value;t.value='';sendMessage(state.activeConvId,v)}"
                ${state.streaming ? 'disabled' : ''}>
                ${state.streaming ? '...' : 'Send'}
              </button>
            </div>
          </div>
        </div>
        <div class="search-view ${state.view === 'search' ? 'active' : ''}">
          <div class="search-box">
            <input id="search-input" placeholder="Search the knowledge base..." onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()">Search</button>
          </div>
          <div class="search-results" id="search-results">
            <div style="color:var(--text2);padding:24px;text-align:center">
              Enter a query to search 120K chunks from 54 scriptures.
            </div>
          </div>
        </div>
      </div>
    </div>`;

  if (state.view === 'chat') scrollToBottom();
}

// ── Init ──────────────────────────────────────────────────────
async function initApp() {
  try {
    const me = await API.getMe();
    state.user = me.username;
    state.conversations = await API.listConversations();
  } catch(e) {}
  render();
}

if (state.token) {
  initApp();
} else {
  render();
}
</script>
</body>
</html>
